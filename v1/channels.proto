syntax = "proto3";

package sirius.msgdef.v1;

import "msgdef/general.proto";

message ChannelOpenRequest {
  sirius.msgdef.UUID featureId = 1;
}

message ChannelOpenResponse {
  bool success = 1;

  sirius.msgdef.UUID featureId = 2;
  fixed32 channelId = 3;
}

message ChannelCloseRequest {
  fixed32 channelId = 1;
}

message ChannelCloseResponse {
  bool success = 1;

  fixed32 channelId = 2;
}

message ChannelControlMessage {
  oneof payload {
    ChannelOpenRequest channelOpenRequest = 1;
    ChannelOpenResponse channelOpenResponse = 2;
    ChannelCloseRequest channelCloseRequest = 3;
    ChannelCloseResponse channelCloseResponse = 4;
  }
}