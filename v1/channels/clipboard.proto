syntax = "proto3";

package sirius.v1.channels.clipboard;

import "msgdef/general.proto";

message ClipboardData {
  string contentType = 1;
  fixed64 size = 2;

  /// 512KB 이하의 데이터는 여기에 포함될 수 있습니다.
  // TODO: 대용량 데이터 전송 방법 정의
  optional bytes data = 3;
}

message ClipboardEvent {
  fixed64 timestamp = 1;
  ClipboardData data = 2;
}
