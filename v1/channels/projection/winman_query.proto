syntax = "proto3";

package sirius.msgdef.v1.channels.projection;

import "msgdef/general.proto";

import "msgdef/v1/channels/projection/projection_typedef.proto";

/*
# Projection: Window Management (Query)

## 'Window Filter'
- 윈도우 목록 요청 시 특정 조건에 맞는 윈도우만 필터링하여 요청할 수 있습니다.

### EXAMPLES
```
- (windowID IS 1234567890) OR (pid IS 9876)
- (application ICONTAINS "Google Chrome") OR (application ICONTAINS "chrome.exe") OR (application ICONTAINS "google-chrome")
```

### SYNOPSIS
```swift
@cron(schedule: "every 1 hour")
func digitalDetoxBot() async {
    let windows = await projectionChannel.requestWindowList(
      filter: .or([
        .windowTitle.icontains("HENTAI"),
      ])
    )

    windows.forEach { await projectionChannel.closeWindow(windowId: $0.windowId) }
    /// remoteShellChannel은 실제로 없습니다
    await remoteShellChannel.evaluate("say '야! 내가 이런거 보지 말랬지!!'")
}
```
 */

/// 상수 정의용. protobuf의 enum은 signed인 탓도 있으므로 이 타입을 직접 사용하지 마십시오.
enum WindowInfoFlags {
  WINDOW_INFO_FLAG_NONE = 0x0000;

  /// 윈도우가 현재 포커스를 받고 있습니다.
  WINDOW_INFO_FLAG_IS_FOCUSED = 0x0001;

  /// 이 윈도우는 사용자에게 보이지 않도록 설정되어 있습니다.
  WINDOW_INFO_FLAG_IS_HIDDEN = 0x0002;

  /// 이 윈도우는 타이틀 바 등의 윈도우 데코레이션을 가지고 있지 않습니다.
  WINDOW_INFO_FLAG_NO_WINDOW_DECORATION = 0x0004;

  /// 이 윈도우는 작업 표시줄 (Windows, Linux) 또는 독 (macOS)에 표시되지 않습니다.
  WINDOW_INFO_FLAG_SKIP_WINDOW_ENTRY = 0x0008;

  /// 윈도우가 최소화 된 상태입니다.
  WINDOW_INFO_FLAG_IS_MINIMIZED = 0x0010;

  /// 윈도우가 최대화 된 상태입니다.
  WINDOW_INFO_FLAG_IS_MAXIMIZED = 0x0020;

  /// 윈도우가 전체 화면 모드로 표시되고 있습니다.
  WINDOW_INFO_FLAG_IS_FULLSCREEN = 0x0040;

  /// 이 윈도우는 최소화가 불가능합니다.
  WINDOW_INFO_FLAG_CANNOT_MINIMIZE = 0x0100;

  /// 이 윈도우는 최대화가 불가능합니다.
  WINDOW_INFO_FLAG_CANNOT_MAXIMIZE = 0x0200;

  /// 이 윈도우는 전체 화면 모드로 전환할 수 없습니다.
  WINDOW_INFO_FLAG_CANNOT_FULLSCREEN = 0x0400;

  /// 이 윈도우는 항상 위에 표시되는(topmost) 상태입니다.
  WINDOW_INFO_FLAG_IS_TOPMOST = 0x1000;

  /// 이 윈도우는 항상 아래에 표시되는(bottommost) 상태입니다.
  WINDOW_INFO_FLAG_IS_BOTTOMMOST = 0x2000;

  /// Linux: 이 윈도우는 컴포지터를 스킵합니다.
  /// Windows: 이 윈도우는 DWM (Desktop Window Manager)을 스킵합니다. (Aero Glass 효과 등이 적용되지 않음)
  /// - 알려진 호환성 문제가 있는 애플리케이션이나, low-latency를 보장받아야 하는 애플리케이션에 설정되어 있을 수 있습니다.
  WINDOW_INFO_FLAG_SKIP_COMPOSITOR = 0x00010000;
}

enum WindowRole {
  WINDOW_ROLE_UNKNOWN = 0;
  /// 일반 윈도우
  WINDOW_ROLE_NORMAL = 1;
  /// 다이얼로그 윈도우
  WINDOW_ROLE_DIALOG = 2;
  /// 툴팁 윈도우
  WINDOW_ROLE_TOOLTIP = 3;
  /// 메뉴
  WINDOW_ROLE_MENU = 4;

  /// 알림 윈도우
  WINDOW_ROLE_NOTIFICATION = 5;

  // 여기에 뭐가 더 들어가야 하지...?
}

/// # Window Hints
/// - 효율적인 프로젝션을 위해 윈도우에 대한 힌트를 제공할 수 있습니다.
enum WindowHint {
  WINDOW_HINT_NONE = 0x0000;

  /// 이 윈도우는 시스템 UI의 일부입니다.
  /// 예시: 탐색 막대, 상태 표시줄, 알림 센터, IME 패널 (한글-한자 변환 / 일본어・중국어 변환 후보 등)
  WINDOW_HINT_SYSTEM_UI = 0x0001;

  /// 이 윈도우는 시스템에 의해 응답하지 않는 것으로 보고되었습니다.
  WINDOW_HINT_NOT_RESPONDING = 0x0002;

  /// 이 윈도우는 시스템 정책에 의해 조작이 불가능할 것으로 예상됩니다. (다른 유저 세션의 윈도우, 고권한 프로세스의 윈도우, UAC 등)
  WINDOW_HINT_INACCESSIBLE = 0x0004;

  /// 이 윈도우는 시스템 정책에 의해 캡처가 불가능할 것으로 예상됩니다. (DRM 보호 컨텐츠 등)
  /// @note 이 힌트는 무조건 캡처가 불가능하다는 보장이 아닙니다. 실제로 캡처는 이루어질 수 있으나, 검은 화면 등으로 나타날 수 있습니다.
  WINDOW_HINT_PROTECTED_CONTENT = 0x0008;

  /// 이 윈도우는 제 3자의 외부 DRM 솔루션, 안티-치트 솔루션 등에 의해 강력히 보호되는 것으로 보입니다.
  /// - 이 윈도우를 캡쳐하거나 원격으로 조작하려고 시도할 경우, 서버 구현체의 프로세스가 충돌하거나 강제 종료될 수도 있기 때문에 프로젝션을 권장하지 않습니다.
  /// - e.g.) AhnLab Safe Transaction, Fasoo DRM 등
  WINDOW_HINT_AGGRESSIVE_PROTECTED_CONTENT = 0x0010;

  /// 이 윈도우는 현재 다른 창에 가려져 있거나 해서 화면에 보이지 않는 상태입니다.
  WINDOW_HINT_NOT_VISIBLE_ON_SCREEN = 0x0020;

  /// 이 윈도우는 자주 변경되지 않는 정적 콘텐츠를 포함하고 있습니다.
  WINDOW_HINT_STATIC_CONTENT = 0x0100;

  /// 이 윈도우는 빠르게 갱신되는 동적 컨텐츠 (예: 비디오 플레이어, 게임 등)를 포함하고 있습니다.
  WINDOW_HINT_DYNAMIC_CONTENT = 0x0200;

  /// 이 윈도우는 그림자를 포함하고 있습니다.
  /// - 윈도우 외곽에 그림자가 있는 경우에 유용합니다.
  /// - AppStream (가칭) 같은 기능을 구현할 때, 클라이언트 측에서 대신 shadow를 그리도록 할 수 있습니다.
  WINDOW_HINT_HAS_SHADOW = 0x1000;

  /// 이 윈도우는 투명한 영역을 포함하고 있습니다.
  /// - border-radius가 설정되었거나, 부분적으로 투명한 UI를 포함하는 윈도우에 유용합니다.
  WINDOW_HINT_HAS_TRANSPARENCY = 0x2000;
}

enum WindowFilterExpressionOperator {
  MATCH_EXACT = 0;
  MATCH_CONTAINS = 1;
  MATCH_ICONTAINS = 2;
  /// ## ABOUT REGEX
  /// - REGEX 구현체는 Perl-compatible한 정규 표현식 (PCRE)를 사용하는 것을 권장하나, 강제 사항은 아닙니다.
  MATCH_REGEX = 3;
}

message WindowFilterExpression {
  WindowFilterExpressionOperator operator = 1;
  bool invert = 2;

  oneof field {
    /// 윈도우 핸들 ID로 매칭합니다.
    /// @note OS / DM에 따라 윈도우 핸들 ID의 크기가 다를 수 있으므로 fixed64 타입을 사용합니다.
    fixed64 windowId = 3;

    /// 프로세스 ID로 매칭합니다.
    fixed64 pid = 4;

    /// 윈도우 타이틀로 매칭합니다.
    string windowTitle = 5;

    /// 애플리케이션 이름(실행 파일 이름)으로 매칭합니다.
    /// ## NOTE: Platform Differences
    /// - Windows의 경우 실행 파일 이름 (예: "chrome.exe")을 의미합니다.
    /// - macOS / Linux의 경우 프로세스 이름 (ARGV[0])을 의미합니다. 이는 전체 경로일 수도 있고, 단순 실행 파일 이름일 수도 있습니다.
    ///   - eg: `/Applications/Google Chrome.app/Contents/MacOS/Google Chrome`
    ///   - eg: `/usr/bin/google-chrome-stable`
    ///   - eg: `nginx: worker process` (자기 자신의 ARGV[0]을 수정하는 케이스)
    ///   - eg: `python3 script.py` (전체 경로가 아닌 실행 파일만 나타나는 케이스)
    string applicationName = 6;

    /// 번들 ID로 매칭합니다.
    /// - 의미는 서버 구현체에 따라 다를 수 있습니다.
    ///   Noctiluca의 경우 macOS의 번들 ID (예: "com.apple.Safari")를 의미합니다.
    /// - eg) Android의 경우 패키지 이름 (예: "com.google.android.youtube")을 의미할 수 있습니다.
    string applicationBundleID = 7;

    /// 윈도우 클래스 이름으로 매칭합니다.
    /// - macOS는 클래스 이름을 지원하지 않으므로 이 필드는 무시될 수 있습니다.
    string windowClass = 8;
  }
}


enum WindowFilterOperator {
  AND = 0; // 모든 조건 만족
  OR = 1;  // 하나라도 만족
}

message WindowFilter {
  WindowFilterOperator operator = 1;

  // 조건들의 목록 (Recursive)
  // 예: (A OR B) AND C 를 표현 가능
  repeated WindowFilter expressions = 2;

  // 혹은 단일 조건 (Leaf Node)
  optional WindowFilterExpression expression = 3;
}

enum WindowListRequestFlags {
  WINDOW_LIST_REQUEST_FLAG_NONE = 0x0000;

  /// 페이지네이션 된 결과를 요청합니다.
  /// (사실 말이 페이지네이션이지 N개씩 분할해서 보내달라는 뜻입니다)
  /// - 페이지네이션 사이즈는 서버 구현체에 따라 다를 수 있습니다.
  WINDOW_LIST_REQUEST_FLAG_PAGINATED = 0x0001;

  /// 통상적으로 숨겨진 윈도우들도 함께 요청합니다.
  WINDOW_LIST_REQUEST_FLAG_INCLUDE_HIDDEN_WINDOWS = 0x0002;
}

// opcode = 0x8101
message WindowListRequest {
  fixed64 requestId = 1;

  /// 필터 조건
  optional WindowFilter filter = 2;

  /// 윈도우 목록 요청 플래그 (WindowListRequestFlags 참조)
  fixed32 flags = 16;
}

message WindowInfo {
  fixed64 windowId = 1;
  fixed64 pid = 2;

  string windowTitle = 3;
  string applicationName = 4;
  string applicationBundleID = 5;
  string windowClass = 6;

  WindowRole role = 7;

  SRRect bounds = 8;

  /// 이 윈도우의 아이콘 해시값.
  optional fixed64 iconHash = 9;
  /// 이 윈도우의 섬네일 이미지 (PNG8 (with alpha channel) 형식, aspect ratio 유지, 최대 512x512)
  optional bytes thumbnail = 12;

  /// 추가 메타데이터
  /// @note **모든 메타데이터 키는 optional입니다**. 모든 서버 구현체가 이를 반드시 지원한다는 보장은 없고, 모든 키가 항상 제공되는 것도 아닙니다.
  /// @note 구현체-specific 메타데이터 키는 reversed domain name 형식을 따르십시오. (예: "com.contoso.superremote.virtual-display-purpose" 등)
  /// @key "related-display-id": 이 디스플레이가 다른 디스플레이의 미러링을 수행하고 있는 경우, 그 원본 디스플레이 ID를 나타냅니다.
  /// @key "connection-type": 디스플레이 연결 유형 (예: "HDMI", "DisplayPort", "USB-C", "Wireless" 등)
  map<string, string> metadata = 13;

  /// 윈도우 힌트 (WindowHint 참조)
  fixed32 hints = 14;
  /// 윈도우 상태 플래그 (WindowInfoFlags 참조)
  fixed32 flags = 15;
}

// opcode = 0x8042
message WindowListResponse {
  fixed64 requestId = 1;
  repeated WindowInfo windows = 2;

  /// 페이지네이션 된 결과의 마지막 페이지인지 여부
  bool isLastPage = 3;
}

// @message
message GetWindowInfoRequest {
  fixed64 requestId = 1;
  fixed64 windowId = 2;
}

// @message
message GetWindowInfoResponse {
  fixed64 requestId = 1;
  optional WindowInfo info = 2;
}

// @message
message GetWindowIconRequest {
  fixed64 requestId = 1;
  fixed64 windowId = 2;
}

// @message
message GetWindowIconResponse {
  fixed64 requestId = 1;
  fixed64 windowId = 2;
  /// 이 윈도우의 아이콘 이미지 (PNG8 (with alpha channel) 형식, requires square aspect ratio, 최대 256x256)
  optional bytes icon = 3;
}

// @message
message GetWindowThumbnailRequest {
  fixed64 requestId = 1;
  fixed64 windowId = 2;
}

// @message
message GetWindowThumbnailResponse {
  fixed64 requestId = 1;
  fixed64 windowId = 2;
  /// 이 윈도우의 섬네일 이미지 (PNG8 (with alpha channel) 형식, aspect ratio 유지, 최대 512x512)
  optional bytes thumbnail = 3;
}

enum WindowChangeEventType {
  /// 사용 금지
  WINDOW_CHANGE_EVENT_TYPE_NONE = 0;

  /// 윈도우가 포커스를 얻었습니다.
  WINDOW_CHANGE_EVENT_TYPE_FOCUSED = 0x0001;

  /// 윈도우가 포커스를 잃었습니다.
  WINDOW_CHANGE_EVENT_TYPE_UNFOCUSED = 0x0002;

  /// 윈도우가 이동되었습니다.
  WINDOW_CHANGE_EVENT_TYPE_MOVED = 0x0004;

  /// 윈도우가 크기 조절되었습니다.
  WINDOW_CHANGE_EVENT_TYPE_RESIZED = 0x0008;

  /// 윈도우가 닫혔습니다.
  WINDOW_CHANGE_EVENT_TYPE_CLOSED = 0x0010;

  /// 윈도우의 메타데이터가 크게 변경되었습니다.
  WINDOW_CHANGE_EVENT_TYPE_METADATA_CHANGED = 0x0020;
}

enum WindowEventSubscriptionFlags {
  WINDOW_EVENT_SUBSCRIPTION_FLAG_NONE = 0x0000;

  /// 구독된 윈도우 이벤트에 대한 초기 상태 스냅샷을 즉시 전송합니다.
  WINDOW_EVENT_SUBSCRIPTION_FLAG_SEND_INITIAL_SNAPSHOT = 0x0001;

  /// 최소한의 데이터만 포함하도록 노력합니다.
  /// - WINDOW_CHANGE_EVENT_TYPE_METADATA_CHANGED를 제외한 모든 이벤트에서, 관련 없는 WindowInfo의 필드를 생략하거나 아예 포함하지 않도록 합니다.
  /// - 이 플래그가 설정되지 않으면, 모든 이벤트에서 리치한 WindowInfo 데이터가 포함됩니다.
  WINDOW_EVENT_SUBSCRIPTION_FLAG_MINIMAL_DATA = 0x0002;
}

message SubscribeWindowEventsRequest {
  fixed64 requestId = 1;
  /// 0x0000인 경우 모든 이벤트를 구독합니다.
  fixed32 eventMask = 2;
  /// 비어있는 경우 모든 윈도우에 대한 이벤트를 구독합니다.
  optional WindowFilter filter = 3;

  fixed32 flags = 16; // reserved
}

message SubscribeWindowEventsResponse {
  fixed64 requestId = 1;
  /// 구독 식별자.
  UUID subscriptionId = 2;
}

message UnsubscribeWindowEventsRequest {
  fixed64 requestId = 1;
  /// 구독 식별자.
  UUID subscriptionId = 2;
}

message UnsubscribeWindowEventsResponse {
  fixed64 requestId = 1;
  /// 구독 식별자.
  UUID subscriptionId = 2;
  /// 구독 해제 성공 여부.
  bool isSuccess = 3;
}

message WindowChangedEvent {
  /// 이벤트 유형 코드 (WindowChangeEventType 참조)
  fixed32 eventType = 1;
  fixed64 windowId = 2;

  /// 변경된 윈도우 정보
  optional WindowInfo info = 3;
}