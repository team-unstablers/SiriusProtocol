syntax = "proto3";

package sirius.msgdef.v1.channels.projection;

import "msgdef/general.proto";

import "msgdef/v1/channels/projection/projection_codec.proto";
import "msgdef/v1/channels/projection/projection_source.proto";

// opcode = 0x8011
message ProjectionRequest {
  sirius.msgdef.UUID identifier = 1;

  ProjectionSource viewport = 2;
  repeated Codec preferredCodecs = 3;
}

// opcode = 0x8012
message StopProjectionRequest {
  sirius.msgdef.UUID identifier = 1;
}

// opcode = 0x8013
message ProjectionPerformanceReport {
  fixed32 receivedFrameCount = 1;
  fixed32 decodedFrameCount = 2;
  fixed32 droppedFrameCount = 3;

  // 평균 디코딩 시간 (ms)
  fixed32 averageDecodeTimeMs = 4;

  // 추가 제안: 지터 버퍼가 얼마나 차있는지?
  fixed32 currentQueueSize = 5;
}

// opcode = 0x8021
message ProjectionSessionCreatedEvent {
  sirius.msgdef.UUID identifier = 1;

  ProjectionSource source = 2;
  Codec codec = 3;
}

// opcode = 0x8022
message ProjectionSessionCreationFailedEvent {
  sirius.msgdef.UUID identifier = 1;
  sfixed32 reason = 2;

  optional string message = 3;
}

// opcode = 0x8023
message ProjectionSessionChangedEvent {
  sirius.msgdef.UUID identifier = 1;
  sfixed32 reason = 2;

  ProjectionSource source = 3;
  Codec codec = 4;
}

// opcode = 0x8024
message ProjectionSessionEndedEvent {
  sirius.msgdef.UUID identifier = 1;
  sfixed32 reason = 2;

  optional string message = 3;
}

