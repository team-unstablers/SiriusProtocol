syntax = "proto3";

package sirius.msgdef.v1.channels.projection;

import "msgdef/general.proto";

// opcode = 0x8041
message WindowListRequest {
  // TODO: filters
}

message WindowInfo {
  fixed64 windowId = 1;
  string title = 2;
  fixed32 x = 3;
  fixed32 y = 4;
  fixed32 width = 5;
  fixed32 height = 6;
  bool isVisible = 7;
}

// opcode = 0x8042
message WindowListResponse {
  repeated WindowInfo windows = 1;
}

// opcode = 0x8043
message WindowFocusRequest {
  fixed64 windowId = 1;
}

// opcode = 0x8051
message WindowFocusChangedEvent {
  /// FIXME
  fixed64 windowId = 1;
  optional WindowInfo info = 2;
}

// opcode = 0x8052
message WindowMovedEvent {
  fixed64 windowId = 1;
  fixed32 x = 2;
  fixed32 y = 3;
}

// opcode = 0x8053
message WindowResizedEvent {
  fixed64 windowId = 1;
  fixed32 width = 2;
  fixed32 height = 3;
}

// opcode = 0x8054
message WindowClosedEvent {
  fixed64 windowId = 1;
}


