syntax = "proto3";

package sirius.msgdef.v1.channels.projection;

import "msgdef/general.proto";

enum AudioStreamKind {
  // 기타 알 수 없는 유형의 오디오 스트림.
  UNKNOWN = 0;

  // 사용자 세션 전역의 오디오 루프백 스트림.
  SESSION_AUDIO = 1;

  // 특정한 애플리케이션의 오디오 스트림.
  APPLICATION_AUDIO = 2;

  // 마이크 입력 오디오 스트림.
  MICROPHONE_AUDIO = 3;
}

message AudioCodec {
  /// FourCC 코드
  /// ## FOURCC CODES
  /// - 'OPUS': Opus Audio Codec
  /// - 'PCMU': G.711 mu-law
  /// - 'PCMA': G.711 A-law
  fixed32 fourCC = 1;

  /// 타겟 비트레이트 (kbps). 값을 0으로 설정하면 서버가 적절한 비트레이트를 선택합니다.
  /// - 기본적으로 VBR(Variable Bit Rate) 모드로 작동합니다.
  /// - CBR(Constant Bit Rate) 모드를 원할 경우, options 필드에 "bitrate-mode: cbr;" 옵션을 추가할 수 있습니다.
  fixed32 bitRate = 2;

  /// 샘플링 레이트 (Hz). 값을 0으로 설정하면 스트림의 기본 샘플링 레이트를 사용합니다.
  fixed32 sampleRate = 3;
  /// 채널 수. 값을 0으로 설정하면 스트림 / 코덱이 지원하는 기본 채널 수를 사용합니다.
  fixed32 channelCount = 4;

  /// "frame-size: 20ms; stream-type: voice;" (opus) 등의 추가 옵션을 지정할 수 있습니다.
  optional string options = 15;
}

/// 오디오 스트림의 프로젝션을 요청합니다.
message AudioProjectionRequest {
  sirius.msgdef.UUID identifier = 1;

  // 프로젝션할 오디오 스트림의 종류.
  AudioStreamKind kind = 2;
  // 특정 오디오 스트림을 지정하는 ID. 비어 있을 경우 기본 스트림이 선택됩니다.
  // 예: APPLICATION_AUDIO의 경우 `pid:{pid}` 또는 `app-bundle-id:com.contoso.gameapp` 형태로 지정할 수 있습니다.
  optional string streamID = 3;

  repeated AudioCodec preferredCodecs = 4;
}

message StopAudioProjectionRequest {
  sirius.msgdef.UUID identifier = 1;
}
